<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Personas - JavaScript</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>
    
    <header>
        <h1>Ejercicio 2</h1>
        <p>Formulario dinámico con JavaScript</p>
    </header>
    
    <nav>
        <a href="index.html">Inicio</a>
    </nav>
    
    <div class="container">
        <div class="card">
            
           <h2>Registrar Persona</h2>
           <form id="formulario">
            
            <input
            
            type="text"
            id="nombre"
            placeholder="Nombre"
            required>
            
            <input
            type="text"
            id="apellido"
            placeholder="Apellido"
            required>
            
            <input
            type="number"
            id="edad"
            placeholder="Edad"
            required>
            
            <input
            type="number"
            step="0.01"
            id="altura"
            placeholder="Altura (m)"
            required>
            
            <input
            type="number"
            step="0.1"
            id="peso"
            placeholder="Peso (kg)"
            required>
            
            <button 
            type="submit"> Agregar Persona
            </button>
        </form>
        
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Edad</th>
                    <th>Altura</th>
                    <th>Peso</th>
                    <th>IMC</th>
                    <th>Acción</th>
                </tr>
            </thead>
            
            <tbody 
            id="tablaPersonas">
            </tbody>
        
        </table>
    
    </div>
    </div>    
    <footer> Programación III - Trabajo Práctico N° 3 </footer>
    <script src="js/personas.js"></script>

</body>

</html>
